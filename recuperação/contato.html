<section>
    <p>Problemas com o produto ou serviço? Entre em contato conosco!</p>
</section>

<form name="contactForm" method="post">

    <p>Nome:</p>
    <input type="text" name="name" placeholder="Nome" required><br>
    <p>Email:</p>
    <input type="email" name="email" placeholder="Email" required><br>
    <p>Telefone:</p>
    <input type="text" name="DDD" placeholder="DDD">
    <input type="text" name="telefone" placeholder="Telefone"><br>
    <p>Problema:</p>
    <textarea name="problema" id="problema" placeholder="Informe o Problema" cols="40" rows="5" required></textarea><br>
    <input type="submit" value="Enviar">



</form>
