<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Inscrições</title>
</head>
<body>

<h2>Inscrição para Cursos</h2>

<form>

<h3>Dados pessoais</h3>
Nome completo:<br>
<input type="text" required><br><br>

CPF:<br>
<input type="text" required><br><br>

Data de nascimento:<br>
<input type="date"><br><br>

<h3>Endereço</h3>
Rua:<br>
<input type="text"><br><br>

Número:<br>
<input type="number"><br><br>

Cidade:<br>
<input type="text"><br><br>

Estado:<br>
<input type="text"><br><br>

Curso desejado:<br>
<select>
    <option>Informática</option>
    <option>Administração</option>
    <option>Enfermagem</option>
    <option>Mecânica</option>
</select><br><br>

Turno:<br>
<input type="radio" name="turno"> Manhã<br>
<input type="radio" name="turno"> Tarde<br>
<input type="radio" name="turno"> Noite<br><br>

Possui experiência?<br>
<input type="radio" name="exp"> Sim<br>
<input type="radio" name="exp"> Não<br><br>

Áreas de interesse:<br>
<input type="checkbox"> Programação<br>
<input type="checkbox"> Redes<br>
<input type="checkbox"> Design<br><br>

Upload de documento:<br>
<input type="file"><br><br>

Observações:<br>
<textarea rows="4" cols="30"></textarea><br><br>

<input type="submit" value="Enviar">

</form>

</body>
</html>
