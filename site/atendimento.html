<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Atendimento</title>
</head>
<body>

<h2>Atendimento ao Cliente</h2>

<form>
    Nome completo:<br>
    <input type="text" required><br><br>

    E-mail:<br>
    <input type="email" required><br><br>

    Telefone:<br>
    <input type="tel"><br><br>

    Tipo de atendimento:<br>
    <select>
        <option>Dúvida</option>
        <option>Reclamação</option>
        <option>Sugestão</option>
    </select><br><br>

    Prioridade:<br>
    <input type="radio" name="prioridade"> Baixa<br>
    <input type="radio" name="prioridade"> Média<br>
    <input type="radio" name="prioridade"> Alta<br><br>

    Descrição:<br>
    <textarea rows="5" cols="30"></textarea><br><br>

    Anexo:<br>
    <input type="file"><br><br>

    <input type="checkbox"> Autorizo contato<br><br>

    <input type="submit" value="Enviar">
</form>

</body>
</html>
