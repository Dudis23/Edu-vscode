<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Olimpíada de Robótica</title>
</head>
<body>

<h2>Inscrição - Robótica</h2>

<form>

Nome completo:<br>
<input type="text" required><br><br>

E-mail institucional:<br>
<input type="email" required><br><br>

Curso:<br>
<input type="text"><br><br>

Série/Ano:<br>
<input type="text"><br><br>

Modalidade:<br>
<input type="radio" name="modalidade"> Olimpíada<br>
<input type="radio" name="modalidade"> Projeto<br><br>

Nome da equipe:<br>
<input type="text"><br><br>

Quantidade de integrantes:<br>
<input type="number" min="1" max="10"><br><br>

Lista de integrantes:<br>
<textarea rows="4"></textarea><br><br>

Necessita de equipamentos especiais?<br>
<input type="text"><br><br>

Upload da proposta:<br>
<input type="file"><br><br>

<input type="checkbox" required> Aceito o regulamento<br><br>

<input type="submit" value="Enviar">
<input type="reset" value="Limpar">

</form>

</body>
</html>
